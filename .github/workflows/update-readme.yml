name: Update README and Deploy to Pages

on:
  push:
    branches: [main] # Pushes only to main branch
    paths:
      - 'data.json'                           # Metadata file
      - 'closed_opportunities.json'
      - 'generate_readme.py'                  # Update script
      - 'README_template.md'                  # Template README file
      - '.github/workflows/update-readme.yml' # GitHub Actions workflow
  workflow_dispatch:  #Allow manual triggering

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Generate README files
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Generate README files
        run: python generate_readme.py
 
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md CLOSED.md
          git diff --staged --quiet || git commit -m "docs: Update README from data.json"
          git push || echo "No changes to push"
 
      - name: Setup Pages
        uses: actions/configure-pages@v4
 
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
 
  # Job 2: Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4